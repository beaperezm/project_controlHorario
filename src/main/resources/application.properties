spring.application.name=fichApp-api
spring.flyway.enabled=true

# Perfil Local por defecto
spring.profiles.active=server

# JPA/Hibernate Configuración general
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Subida Archivos (Resolviendo HTTP 413 Payload Too Large)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Mostrar mensajes de error detallados
server.error.include-message=always
server.error.include-exception=true

# --- Mail Config Mock ---
# Estas configuraciones son requeridas por spring-boot-starter-mail
# para crear el bean JavaMailSender, aunque no se usen (o en dev/test)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-email@gmail.com
spring.mail.password=tu-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

