# Perfil para Servidor Propio (Remoto/VPS)
# Permite configuración dinámica desde la interfaz o variables de entorno
spring.datasource.url=${SERVER_DB_URL:jdbc:postgresql://localhost:5432/fichapp_db}
spring.datasource.username=${SERVER_DB_USER:admin}
spring.datasource.password=${SERVER_DB_PASS:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false
