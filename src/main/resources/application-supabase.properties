# Configuración para el perfil SUPABASE
spring.datasource.url=${SUPABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_USER:postgres}
spring.datasource.password=${SUPABASE_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Optimizado para Supabase
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.locations=classpath:db/migration/postgresql
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=true

# Supabase REST API (se leen de SUPABASE_PROJECT_URL para evitar conflicto con SUPABASE_URL de JDBC)
supabase.rest-url=${SUPABASE_PROJECT_URL:}
supabase.rest-key=${SUPABASE_ANON_KEY:}
